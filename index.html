<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인 페이지 만들기</title>
    <style>
        body{
            font-size: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 20;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .main-title{
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 40px;
            text-align: center;
        }
        .container{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }
        .card{
            background-color: white;
            border: 1px solid gray;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: black;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 120px;
        }
        .card:hover {
            border-color: #999999;
            transform: translateY(-3px);
        }
        .card h3 {
            margin: 0 0 8px 0;
            font-size: 18px;
            font-weight: bold;
            word-break: keep-all;
        }

        .card p {
            margin: 0;
            font-size: 14px;
            color: #555555;
        }
    </style>
</head>
<body>
    <h1 class="main-title">정혜린의 홈페이지</h1>
    <div class="container">
        <a href="#" class="card">
            <h3>유한대학교 컴퓨터공학과<br>게임콘텐츠전공</h3>
            <p>클릭하세요~</p>
        </a>

        </a>

</html>
