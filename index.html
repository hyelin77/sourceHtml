<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html 1학년 1반 실습</title>
    <style>
        /* 기본 여백 초기화 및 부드러운 폰트 세팅 */
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: 'Malgun Gothic', sans-serif;
        }

        /* 전체 배경을 따뜻하고 부드러운 파스텔 분홍 톤으로 설정 */
        body {
            background-color: #fff5f5;
            color: #4a4a4a;
            padding: 60px 0;
        }

        /* 중앙 정렬 및 최대 너비 제한 */
        .all{
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 헤더 디자인: 파스텔 핑크 감성의 타이틀 */
        header{
            text-align: center;
            margin-bottom: 50px;
        }
        header h1 {
            font-size: 2.2rem;
            color: #ff8787; /* 파스텔 핑크 */
            letter-spacing: -1px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.05);
        }

        /* 격자 배열(Grid)을 사용해 3열로 자동 정렬 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3열 배열 */
            gap: 25px; /* 카드 사이의 간격 */
        }

        /* 카드 개별 디자인 */
        .div{
            background-color: #ffffff;
            border: 1px solid #fcdede; /* 연한 핑크빛 테두리 */
            border-radius: 16px; /* 둥근 모서리 */
            padding: 25px 20px;
            height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 6px rgba(255, 135, 135, 0.03);
            transition: all 0.3s ease; /* 부드러운 애니메이션 */
        }

        /* 마우스를 올렸을 때(Hover) 효과 */
        .div:hover {
            transform: translateY(-5px); /* 살짝 위로 떠오름 */
            border-color: #ffc9c9;
            background-color: #fff0f0; /* 연한 딸기우유빛 배경 */
            box-shadow: 0 12px 20px rgba(255, 135, 135, 0.15); /* 분홍빛 은은한 그림자 */
        }

        /* 카드 제목 스타일 */
        .div h3 {
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.4;
            color: #444444;
            word-break: keep-all; /* 단어 단위 줄바꿈 */
        }

        /* 클릭하세요 버튼 디자인 */
        .div a{
            display: inline-block;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            color: #ff8787;
            background-color: #fff5f5;
            padding: 6px 16px;
            border-radius: 20px;
            transition: all 0.2s;
        }

        /* 버튼 호버 효과 */
        .div:hover a {
            background-color: #ff8787;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="all">
        <header>
            <h1>정혜린의 홈페이지</h1>
        </header>
        
        <main class="grid-container">
            <div class="div">
                <h3>유한대학교 컴퓨터공학과<br>게임콘텐츠전공</h3>
                <a href="https://vr.yuhan.ac.kr/index.do">클릭하세요~</a>
            </div>
            <div class="div">
                <h3>정혜린의 홈페이지</h3>
                <a href="https://hyelin77.github.io/sourceHtml/flexEx.html">클릭하세요~</a>
            </div>
            <div class="div">
                <h3>z-index 실습</h3>
                <a href="zindex.html">클릭하세요~</a>
            </div>

            <div class="div">
                <h3>박스 캐릭터 배치 실습(flex 활용)</h3>
                <a href="boxtest.html">클릭하세요~</a>
            </div>
            <div class="div">
                <h3>js 이미지 변환 실습</h3>
                <a href="clickEx.html">클릭하세요~</a>
            </div>
            <div class="div">
                <h3>티몬 홈페이지</h3>
                <a href="#">클릭하세요~</a>
            </div>

            <div class="div">
                <h3>티몬 홈페이지</h3>
                <a href="#">클릭하세요~</a>
            </div>
            <div class="div">
                <h3>티몬 홈페이지</h3>
                <a href="#">클릭하세요~</a>
            </div>
            <div class="div">
                <h3>티몬 홈페이지</h3>
                <a href="#">클릭하세요~</a>
            </div>
        </main>
    </div>
</body>
</html>
